networks:
  ml_pipeline_net:
    name: ml_pipeline_net
    driver: bridge

volumes:
  postgres_mlflow_data:
  postgres_airflow_data:
  minio_data:
  redis_data:

services:
  # MLflow infrastructure
  postgres_mlflow:
    image: postgres:13
    container_name: mlflow_postgres_db
    hostname: postgres_mlflow
    restart: always
    networks:
      - ml_pipeline_net
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DATABASE}
    volumes:
      - postgres_mlflow_data:/var/lib/postgresql/data

  s3:
    image: minio/minio:latest
    container_name: mlflow_minio_s3
    hostname: s3
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ml_pipeline_net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  create_s3_bucket:
    image: minio/mc
    container_name: mlflow_mc_bucket_creator
    depends_on:
      - s3
    networks:
      - ml_pipeline_net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MLFLOW_BUCKET_NAME: ${MLFLOW_BUCKET_NAME}
    entrypoint: >
      /bin/sh -c '
        until mc alias set s3alias http://s3:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo "waiting for s3..."; sleep 2; done;
        if ! mc ls "s3alias/$$MLFLOW_BUCKET_NAME" > /dev/null 2>&1; then
          mc mb "s3alias/$$MLFLOW_BUCKET_NAME";
          mc policy set public "s3alias/$$MLFLOW_BUCKET_NAME";
        else
          echo "Bucket $$MLFLOW_BUCKET_NAME already exists.";
        fi;
      '

  mlflow:
    build:
      context: ./
      dockerfile: dockerfiles/Dockerfile.mlflow
    container_name: mlflow_server
    hostname: mlflow
    restart: always
    depends_on:
      - postgres_mlflow
      - create_s3_bucket
    ports:
      - "5001:5000"
    networks:
      - ml_pipeline_net
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://s3:9000
    command: >
      mlflow server
      --backend-store-uri postgresql://${PG_USER}:${PG_PASSWORD}@postgres_mlflow:5432/${PG_DATABASE}
      --default-artifact-root s3://${MLFLOW_BUCKET_NAME}/
      --host 0.0.0.0
      --allowed-hosts mlflow,mlflow:5000,localhost,localhost:5001,127.0.0.1,127.0.0.1:5001
      --port 5000

  # Airflow infrastructure
  postgres_airflow:
    image: postgres:13
    container_name: airflow_postgres_db
    hostname: postgres_airflow
    restart: always
    networks:
      - ml_pipeline_net
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: ./
      dockerfile: dockerfiles/Dockerfile.airflow
    container_name: airflow_init
    depends_on:
      - postgres_airflow
    networks:
      - ml_pipeline_net
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
    entrypoint: /bin/bash
    command: >
      -c 'airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com'

  airflow-webserver:
    build:
      context: ./
      dockerfile: dockerfiles/Dockerfile.airflow
    container_name: airflow_webserver
    restart: always
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    networks:
      - ml_pipeline_net
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/project/data
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: stroke_prediction
      MLFLOW_BUCKET_NAME: ${MLFLOW_BUCKET_NAME}
      MODEL_NAME: stroke_prediction_model
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://s3:9000
      API_RELOAD_URL: http://api:8800/reload-model
      STROKE_DATASET_URL: ${STROKE_DATASET_URL:-https://gist.githubusercontent.com/aishwarya8615/d2107f828d3f904839cbcb7eaa85bd04/raw/healthcare-dataset-stroke-data.csv}
      STROKE_DATASET_LOCAL_PATH: /opt/project/data/healthcare-dataset-stroke-data.csv
    command: webserver

  airflow-scheduler:
    build:
      context: ./
      dockerfile: dockerfiles/Dockerfile.airflow
    container_name: airflow_scheduler
    restart: always
    depends_on:
      - airflow-init
    networks:
      - ml_pipeline_net
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/project/data
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow:5432/${AIRFLOW_DB_NAME}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: stroke_prediction
      MLFLOW_BUCKET_NAME: ${MLFLOW_BUCKET_NAME}
      MODEL_NAME: stroke_prediction_model
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://s3:9000
      API_RELOAD_URL: http://api:8800/reload-model
      STROKE_DATASET_URL: ${STROKE_DATASET_URL:-https://gist.githubusercontent.com/aishwarya8615/d2107f828d3f904839cbcb7eaa85bd04/raw/healthcare-dataset-stroke-data.csv}
      STROKE_DATASET_LOCAL_PATH: /opt/project/data/healthcare-dataset-stroke-data.csv
    command: scheduler

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    hostname: redis
    restart: always
    networks:
      - ml_pipeline_net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # FastAPI
  api:
    build:
      context: ./
      dockerfile: dockerfiles/Dockerfile.fastapi
    container_name: fastapi_server
    hostname: api
    restart: always
    depends_on:
      - mlflow
      - redis
    ports:
      - "8800:8800"
    networks:
      - ml_pipeline_net
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: stroke_prediction
      MLFLOW_S3_ENDPOINT_URL: http://s3:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_NAME: stroke_prediction_model

  # Streamlit
  streamlit:
    build:
      context: ./
      dockerfile: dockerfiles/Dockerfile.streamlit
    container_name: streamlit_app
    hostname: streamlit
    restart: always
    depends_on:
      - api
      - mlflow
    ports:
      - "8501:8501"
    networks:
      - ml_pipeline_net
    environment:
      API_URL: http://api:8800
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: stroke_prediction
      MLFLOW_S3_ENDPOINT_URL: http://s3:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
